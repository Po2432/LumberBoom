<svg viewBox="0 0 512 512" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#2a2a3a" />
      <stop offset="100%" stop-color="#0f0f15" />
    </radialGradient>

    <!-- Explosion Gradients -->
    <radialGradient id="boomGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6600" stop-opacity="0.8" />
      <stop offset="50%" stop-color="#ff2200" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="burstOuter" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff3300" />
      <stop offset="50%" stop-color="#ff6600" />
      <stop offset="100%" stop-color="#cc1100" />
    </linearGradient>
    <linearGradient id="burstInner" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffcc00" />
      <stop offset="50%" stop-color="#ffff00" />
      <stop offset="100%" stop-color="#ffffff" />
    </linearGradient>

    <!-- Wood Gradients -->
    <linearGradient id="woodTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4d09f" />
      <stop offset="100%" stop-color="#d49a55" />
    </linearGradient>
    <linearGradient id="woodLeft" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c48237" />
      <stop offset="100%" stop-color="#965a19" />
    </linearGradient>
    <linearGradient id="woodRight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8c5211" />
      <stop offset="100%" stop-color="#542e04" />
    </linearGradient>

    <!-- Text Gradients -->
    <linearGradient id="textLumber" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff3d6" />
      <stop offset="40%" stop-color="#f8b500" />
      <stop offset="100%" stop-color="#d67c00" />
    </linearGradient>
    <linearGradient id="textBoom" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="30%" stop-color="#ffea00" />
      <stop offset="70%" stop-color="#ff4b1f" />
      <stop offset="100%" stop-color="#b31200" />
    </linearGradient>

    <!-- Drop Shadows -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#000000" flood-opacity="0.7" />
    </filter>
    <filter id="textShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="4" flood-color="#000000" flood-opacity="0.8" />
    </filter>
    <filter id="glowRed" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Wood Grain Clip Paths -->
    <clipPath id="clipTop">
      <path d="M 256 150 L 356 200 L 256 250 L 156 200 Z" />
    </clipPath>
    <clipPath id="clipLeft">
      <path d="M 156 200 L 256 250 L 256 370 L 156 320 Z" />
    </clipPath>
    <clipPath id="clipRight">
      <path d="M 256 250 L 356 200 L 356 320 L 256 370 Z" />
    </clipPath>

    <!-- Reusable Wood Cube (for flying debris) -->
    <g id="wood-cube">
      <!-- Top Face -->
      <path d="M 0 -50 L 50 0 L 0 50 L -50 0 Z" fill="url(#woodTop)" stroke="#542e04" stroke-width="2" stroke-linejoin="round"/>
      <!-- Left Face -->
      <path d="M -50 0 L 0 50 L 0 110 L -50 60 Z" fill="url(#woodLeft)" stroke="#542e04" stroke-width="2" stroke-linejoin="round"/>
      <!-- Right Face -->
      <path d="M 0 50 L 50 0 L 50 60 L 0 110 Z" fill="url(#woodRight)" stroke="#542e04" stroke-width="2" stroke-linejoin="round"/>
      <!-- Inner Grid Lines -->
      <path d="M -25 -25 L 25 25 M 25 -25 L -25 25" stroke="#542e04" stroke-width="2" opacity="0.6"/>
      <path d="M -25 25 L -25 85 M 0 25 L -50 50" stroke="#3a1c02" stroke-width="2" opacity="0.6"/>
      <path d="M 25 25 L 25 85 M 0 25 L 50 50" stroke="#2a1201" stroke-width="2" opacity="0.6"/>
    </g>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bgGrad)" />

  <!-- Sunburst Rays (Fast-paced action feel) -->
  <g opacity="0.08" fill="#ffffff">
    <polygon points="256,250 0,0 60,0" />
    <polygon points="256,250 150,0 210,0" />
    <polygon points="256,250 300,0 360,0" />
    <polygon points="256,250 450,0 512,0" />
    <polygon points="256,250 512,80 512,140" />
    <polygon points="256,250 512,230 512,290" />
    <polygon points="256,250 512,380 512,440" />
    <polygon points="256,250 450,512 390,512" />
    <polygon points="256,250 300,512 240,512" />
    <polygon points="256,250 150,512 90,512" />
    <polygon points="256,250 0,440 0,380" />
    <polygon points="256,250 0,290 0,230" />
    <polygon points="256,250 0,140 0,80" />
  </g>

  <!-- Explosion Glow -->
  <circle cx="256" cy="230" r="200" fill="url(#boomGlow)" />

  <!-- Explosion Burst Outer -->
  <path d="M 256 30 L 285 120 L 390 50 L 335 150 L 470 170 L 360 220 L 480 300 L 350 300 L 410 420 L 290 340 L 256 460 L 220 340 L 100 420 L 160 300 L 30 300 L 150 220 L 40 170 L 175 150 L 120 50 L 225 120 Z" fill="url(#burstOuter)" filter="url(#shadow)" />
  
  <!-- Explosion Burst Inner -->
  <path d="M 256 80 L 275 140 L 350 90 L 315 160 L 410 175 L 330 210 L 420 270 L 320 270 L 360 360 L 280 300 L 256 390 L 232 300 L 152 360 L 192 270 L 92 270 L 182 210 L 102 175 L 197 160 L 162 90 L 237 140 Z" fill="url(#burstInner)" />

  <!-- Flying Debris (Small Cubes) -->
  <use href="#wood-cube" x="0" y="0" transform="translate(100, 110) scale(0.35)" filter="url(#shadow)" />
  <use href="#wood-cube" x="0" y="0" transform="translate(410, 160) scale(0.25)" filter="url(#shadow)" />
  <use href="#wood-cube" x="0" y="0" transform="translate(120, 360) scale(0.4)" filter="url(#shadow)" />
  <use href="#wood-cube" x="0" y="0" transform="translate(400, 340) scale(0.3)" filter="url(#shadow)" />

  <!-- Main Isometric Wood Block Puzzle -->
  <g filter="url(#shadow)">
    <!-- Top Face -->
    <path d="M 256 150 L 356 200 L 256 250 L 156 200 Z" fill="url(#woodTop)" />
    <!-- Left Face -->
    <path d="M 156 200 L 256 250 L 256 370 L 156 320 Z" fill="url(#woodLeft)" />
    <!-- Right Face -->
    <path d="M 256 250 L 356 200 L 356 320 L 256 370 Z" fill="url(#woodRight)" />

    <!-- Wood Grain Details -->
    <g clip-path="url(#clipTop)" fill="none" stroke="#a66e33" stroke-width="1.5" opacity="0.4">
      <path d="M 120 180 Q 256 130 380 220" />
      <path d="M 140 190 Q 256 160 370 240" />
      <path d="M 160 210 Q 256 190 350 260" />
      <ellipse cx="280" cy="190" rx="15" ry="5" transform="rotate(-20 280 190)" />
    </g>
    <g clip-path="url(#clipLeft)" fill="none" stroke="#5c3810" stroke-width="1.5" opacity="0.4">
      <path d="M 140 220 Q 200 280 270 260" />
      <path d="M 140 250 Q 200 310 270 290" />
      <path d="M 140 280 Q 200 340 270 320" />
      <path d="M 140 310 Q 200 370 270 350" />
      <ellipse cx="200" cy="280" rx="4" ry="12" transform="rotate(15 200 280)" />
    </g>
    <g clip-path="url(#clipRight)" fill="none" stroke="#361e06" stroke-width="1.5" opacity="0.4">
      <path d="M 240 260 Q 300 280 370 220" />
      <path d="M 240 290 Q 300 310 370 250" />
      <path d="M 240 320 Q 300 340 370 280" />
      <path d="M 240 350 Q 300 370 370 310" />
    </g>

    <!-- Puzzle Block Sub-Cube Shading (to emphasize it's a puzzle) -->
    <path d="M 256 150 L 306 175 L 256 200 L 206 175 Z" fill="#ffffff" opacity="0.1" />
    <path d="M 256 200 L 306 225 L 256 250 L 206 225 Z" fill="#000000" opacity="0.1" />
    <path d="M 156 260 L 206 285 L 206 345 L 156 320 Z" fill="#000000" opacity="0.15" />
    <path d="M 256 250 L 306 225 L 306 285 L 256 310 Z" fill="#ffffff" opacity="0.05" />
    <path d="M 306 285 L 356 260 L 356 320 L 306 345 Z" fill="#000000" opacity="0.2" />

    <!-- Deep Grid Seams (Block Puzzle Lines) -->
    <!-- Top Face Seams -->
    <path d="M 206 175 L 306 225" stroke="#4a2e12" stroke-width="4" stroke-linecap="round" />
    <path d="M 206 177 L 306 227" stroke="#f4d09f" stroke-width="1.5" stroke-linecap="round" opacity="0.6" />
    <path d="M 306 175 L 206 225" stroke="#4a2e12" stroke-width="4" stroke-linecap="round" />
    <path d="M 306 177 L 206 227" stroke="#f4d09f" stroke-width="1.5" stroke-linecap="round" opacity="0.6" />
    
    <!-- Left Face Seams -->
    <path d="M 206 225 L 206 345" stroke="#3a1c02" stroke-width="4" stroke-linecap="round" />
    <path d="M 208 225 L 208 345" stroke="#d49a55" stroke-width="1.5" stroke-linecap="round" opacity="0.4" />
    <path d="M 156 260 L 256 310" stroke="#3a1c02" stroke-width="4" stroke-linecap="round" />
    <path d="M 156 262 L 256 312" stroke="#d49a55" stroke-width="1.5" stroke-linecap="round" opacity="0.4" />

    <!-- Right Face Seams -->
    <path d="M 306 225 L 306 345" stroke="#2a1201" stroke-width="4" stroke-linecap="round" />
    <path d="M 304 225 L 304 345" stroke="#965a19" stroke-width="1.5" stroke-linecap="round" opacity="0.4" />
    <path d="M 256 310 L 356 260" stroke="#2a1201" stroke-width="4" stroke-linecap="round" />
    <path d="M 256 312 L 356 262" stroke="#965a19" stroke-width="1.5" stroke-linecap="round" opacity="0.4" />

    <!-- 3D Bevel Highlights & Shadows (Outer Edges) -->
    <path d="M 256 150 L 356 200 L 352 202 L 256 154 L 160 202 L 156 200 Z" fill="#ffffff" opacity="0.3" />
    <path d="M 156 200 L 160 202 L 160 318 L 156 320 Z" fill="#ffffff" opacity="0.2" />
    <path d="M 356 200 L 352 202 L 352 318 L 356 320 Z" fill="#000000" opacity="0.4" />
    <path d="M 256 370 L 256 250 L 260 252 L 260 368 Z" fill="#ffffff" opacity="0.1" />

    <!-- Digital Bomb Timer (Glowing Red on Left Face) -->
    <!-- Center of left face is X=206, Y=285. Skewing for isometric perspective. -->
    <g transform="translate(206, 285) skewY(26.565) scale(0.866, 1)">
      <rect x="-30" y="-15" width="60" height="30" rx="4" fill="#1a0a00" opacity="0.8" />
      <text x="0" y="6" font-family="monospace, sans-serif" font-weight="900" font-size="22" fill="#ff3333" text-anchor="middle" filter="url(#glowRed)">00:03</text>
      <text x="0" y="6" font-family="monospace, sans-serif" font-weight="900" font-size="22" fill="#ffffff" text-anchor="middle">00:03</text>
    </g>
  </g>

  <!-- Bomb Fuse & Spark -->
  <g filter="url(#shadow)">
    <!-- Metal Base -->
    <ellipse cx="256" cy="150" rx="20" ry="10" fill="#444444" stroke="#222222" stroke-width="2" />
    <ellipse cx="256" cy="146" rx="20" ry="10" fill="#888888" />
    <ellipse cx="256" cy="146" rx="8" ry="4" fill="#111111" />

    <!-- Fuse Cord -->
    <path d="M 256 146 Q 230 90 280 60 T 320 25" fill="none" stroke="#3a2311" stroke-width="8" stroke-linecap="round" />
    <path d="M 256 146 Q 230 90 280 60 T 320 25" fill="none" stroke="#6b4629" stroke-width="3" stroke-linecap="round" stroke-dasharray="5 5" />

    <!-- Spark Glow -->
    <circle cx="320" cy="25" r="18" fill="#ffaa00" filter="url(#glowRed)" opacity="0.8" />
    
    <!-- Spark Starburst -->
    <polygon points="320,0 325,15 345,15 330,25 335,45 320,32 305,45 310,25 295,15 315,15" fill="#ffffff" />
    <polygon points="320,8 323,18 335,18 325,25 328,35 320,28 312,35 315,25 305,18 317,18" fill="#ffea00" />
    <circle cx="320" cy="25" r="5" fill="#ffffff" />
    
    <!-- Spark Particles -->
    <circle cx="295" cy="5" r="3" fill="#ffea00" />
    <circle cx="345" cy="5" r="2" fill="#ffffff" />
    <circle cx="350" cy="35" r="3" fill="#ffaa00" />
    <circle cx="290" cy="40" r="2.5" fill="#ffffff" />
  </g>

  <!-- Typography: LUMBER BOOM -->
  <g filter="url(#textShadow)">
    <!-- LUMBER -->
    <text x="256" y="435" font-family="Impact, 'Arial Black', sans-serif" font-size="60" font-weight="900" text-anchor="middle" fill="url(#textLumber)" stroke="#3e1f04" stroke-width="12" stroke-linejoin="round" paint-order="stroke fill">LUMBER</text>
    <!-- Inner Highlight for LUMBER -->
    <text x="256" y="435" font-family="Impact, 'Arial Black', sans-serif" font-size="60" font-weight="900" text-anchor="middle" fill="none" stroke="#ffffff" stroke-width="2" stroke-linejoin="round" opacity="0.5" paint-order="stroke fill">LUMBER</text>

    <!-- BOOM -->
    <text x="256" y="495" font-family="Impact, 'Arial Black', sans-serif" font-size="76" font-weight="900" text-anchor="middle" fill="url(#textBoom)" stroke="#3e1f04" stroke-width="14" stroke-linejoin="round" paint-order="stroke fill" letter-spacing="2">BOOM</text>
    <!-- Inner Highlight for BOOM -->
    <text x="256" y="495" font-family="Impact, 'Arial Black', sans-serif" font-size="76" font-weight="900" text-anchor="middle" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linejoin="round" opacity="0.6" paint-order="stroke fill" letter-spacing="2">BOOM</text>
  </g>

  <!-- Foreground Smoke/Dust Particles (Adds depth) -->
  <g fill="#ffffff" opacity="0.15">
    <circle cx="80" cy="450" r="15" filter="blur(2px)" />
    <circle cx="110" cy="470" r="25" filter="blur(3px)" />
    <circle cx="420" cy="460" r="20" filter="blur(2px)" />
    <circle cx="460" cy="430" r="12" filter="blur(1px)" />
    <circle cx="60" cy="200" r="18" filter="blur(2px)" />
    <circle cx="450" cy="180" r="22" filter="blur(3px)" />
  </g>
</svg>